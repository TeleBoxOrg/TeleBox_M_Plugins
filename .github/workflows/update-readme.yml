name: Update README Plugin List

on:
  push:
    branches: [ main ]
    paths: [ 'plugins.json', 'README.md' ]
  pull_request:
    branches: [ main ]
    paths: [ 'plugins.json', 'README.md' ]
  workflow_dispatch:
  schedule:
    # Run daily at 3 AM UTC to ensure README is in sync
    - cron: '0 3 * * *'

jobs:
  update-readme:
    runs-on: ubuntu-latest
    # PR 上只校验，不写回 main（无 write 权限时也会失败）
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: write
      pull-requests: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Node.js
      uses: actions/setup-node@v7
      with:
        node-version: '20'

    - name: Update README plugin list
      run: |
        cat > update-readme.js << 'EOF'
        const fs = require('fs');

        try {
          const pluginsData = JSON.parse(fs.readFileSync('plugins.json', 'utf8'));
          let readmeContent = fs.readFileSync('README.md', 'utf8');

          const plugins = Object.keys(pluginsData)
            .map(name => ({
              name: name.trim(),
              desc: (pluginsData[name].desc || '').trim()
            }))
            .filter((plugin, index, self) =>
              index === self.findIndex(p => p.name === plugin.name)
            )
            .sort((a, b) => a.name.localeCompare(b.name, 'zh-CN'));

          const pluginListMd = plugins
            .map(plugin => `- \`${plugin.name}\` - ${plugin.desc}  `)
            .join('\n');

          const startMarker = '## 可用插件列表';
          const endMarker = '## 技术栈';

          const startIndex = readmeContent.indexOf(startMarker);
          const endIndex = readmeContent.indexOf(endMarker);

          if (startIndex === -1 || endIndex === -1) {
            console.error('未找到插件列表标记');
            process.exit(1);
          }

          const beforeSection = readmeContent.substring(0, startIndex + startMarker.length);
          const afterSection = readmeContent.substring(endIndex);
          const newReadmeContent = `${beforeSection}\n${pluginListMd}\n\n${afterSection}`;

          if (readmeContent === newReadmeContent) {
            console.log('✅ README.md 已是最新状态，无需更新');
            process.exit(0);
          }

          fs.writeFileSync('README.md', newReadmeContent, 'utf8');
          console.log(`✅ 已更新 README.md，共 ${plugins.length} 个插件`);
          console.log('插件列表:', plugins.map(p => p.name).join(', '));
        } catch (error) {
          console.error('❌ 更新失败:', error.message);
          process.exit(1);
        }
        EOF

        node update-readme.js
        # 临时脚本不能污染 git status（否则会误判为有变更）
        rm -f update-readme.js

    - name: Check for README changes
      id: verify-changed-files
      run: |
        # 只看已跟踪文件的 diff，忽略 untracked 临时文件
        if [ -n "$(git diff --name-only -- README.md)" ]; then
          echo "changed=true" >> "$GITHUB_OUTPUT"
        else
          echo "changed=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Commit and push changes
      if: steps.verify-changed-files.outputs.changed == 'true' && github.event_name != 'pull_request'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add README.md
        if git diff --cached --quiet; then
          echo "README.md 无 staged 变更，跳过 commit"
          exit 0
        fi
        COUNT=$(node -e "console.log(Object.keys(JSON.parse(require('fs').readFileSync('plugins.json','utf8'))).length)")
        git commit -m "🤖 自动更新插件列表

        - 从 plugins.json 同步插件信息
        - 按字母顺序排序
        - 自动去重处理

        插件数量: ${COUNT}"
        git push
